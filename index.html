<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>marwa mousa</title>
<style>
:root{
  --primary-brown:#542e15;
  --accent-gold:#d4a373;
  --bg-beige:#e2c19d;
}

/* BODY & CONTAINER */
body{
  margin:0;
  padding:0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background-color: var(--bg-beige);
  background-image: 
    url('images/baskwetball.png'),
    url('images/3.png'),
    url('images/3.png'),
    url('images/3.png'),
    url('images/3.png'),
    url('images/3.png'),
    url('images/3.png'),
    radial-gradient(circle, rgba(255,255,255,0.1), rgba(0,0,0,0.05));
  background-repeat: repeat, repeat, repeat, repeat, repeat, repeat, repeat, no-repeat;
  background-size: auto, auto, auto, auto, auto, auto, auto, cover;
  background-blend-mode: multiply, overlay, overlay, overlay, overlay, overlay, overlay, normal;
  color: var(--primary-brown);
  display:flex;
  justify-content:center;
}

.mobile-container{
  width:100%;
  max-width:400px;
  min-height:100vh;
  padding:20px;
  box-sizing:border-box;
  text-align:center;
  position:relative;
  margin:auto;
}

/* TOP NAV */
.bottom-nav{
position:fixed;
top:15px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:360px;
background:#f4efe6;
border-radius:25px;
display:flex;
justify-content:space-around;
align-items:center;
padding:12px 0;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
z-index:10;
}

.bottom-nav svg{
width:24px;
height:24px;
}

.bottom-nav span{
font-size:12px;
}
.bottom-nav a{
  text-decoration:none;
  color:#6b4a2b;
  font-size:12px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  transition:0.3s;
}

.bottom-nav svg{
  width:22px;
  height:22px;
  stroke-width:2;
  transition:0.3s;
}

.bottom-nav a.active{
  color:#a66b3d;
  font-weight:bold;
}

.bottom-nav a.active svg{
  transform:translateY(-5px) scale(1.25);
}

/* HERO */
.hero-section{
  margin:80px 0 20px;
}

.hero-title{
  font-size:14px;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:5px;
}

.main-heading{
  font-family:'Georgia', serif;
  font-style:italic;
  font-size:35px;
  margin:0;
  line-height:2;
}

.shop-now-btn{
  position: relative;
  overflow: hidden;
  background-color:var(--primary-brown);
  color:#fff9f2;
  padding:10px 25px;
  border:none;
  border-radius:5px;
  margin-top:15px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

/* TEXTURE OVERLAY FOR BUTTONS */
.button-texture::before{
  content:'';
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  background-image: url('images/5.png'), radial-gradient(circle, rgba(255,255,255,0.1), rgba(0,0,0,0.05));
  background-repeat: repeat, repeat;
  background-size: cover;
  background-blend-mode: multiply;
  opacity: 0.15;
  pointer-events:none;
  z-index:0;
}

.button-texture * {
  position: relative;
  z-index:1;
}

.shop-now-btn.button-texture:hover,
.shop-item.button-texture:hover,
.modal button.button-texture:hover,
.nav-item.button-texture:hover{
  transform:scale(1.05);
}

/* NAV GRID */
.nav-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:10px;
}

.nav-item{
  background:rgba(255,255,255,0.3);
  border:1px solid rgba(84,46,21,0.2);
  padding:10px;
  border-radius:8px;
  font-size:14px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:8px;
  cursor:pointer;
  position:relative;
  transition:0.3s;
}

/* NAV ITEM TEXTURE */
.nav-item.button-texture::before{
  content:'';
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  background-image: url('images/5.png'), radial-gradient(circle, rgba(255,255,255,0.1), rgba(0,0,0,0.05));
  background-repeat: repeat, repeat;
  background-size: cover;
  background-blend-mode: multiply;
  opacity:0.1;
  pointer-events:none;
  z-index:0;
}

.nav-item img{
  width:70px;
  height:70px;
}

/* SLIDER */
.slider{
  width:100%;
  height:190px;
  margin:15px 0;
  overflow:hidden;
  border-radius:10px;
  position:relative;
}

.slider-track {
  display: flex;
  width: 100%; /* 3 صور */
  transition: transform 0.5s ease-in-out;
}

.slider-track img {
  width: 100%; /* كل صورة تاخد عرض السلايدر بالكامل */
  flex-shrink: 0;
}

.slider-dots{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:8px;
}

.slider-dots span{
  width:10px;
  height:10px;
  border-radius:50%;
  background:rgba(255,255,255,0.5);
  cursor:pointer;
  transition:0.3s;
}

.slider-dots span.active{
  background:var(--primary-brown);
}

/* CATEGORY */
.category-title{
  font-size:18px;
  margin:20px 0;
  position:relative;
}

.category-title::before,
.category-title::after{
  content:".....";
  margin:0 10px;
  color:var(--accent-gold);
}

.shop-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.shop-item{
  background:linear-gradient(to bottom,#a67c52,#542e15);
  color:#fff9f2;
  padding:12px;
  border-radius:4px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:8px;
  font-size:15px;
  box-shadow:0 4px 6px rgba(0,0,0,0.2);
  position:relative;
  transition:0.3s;
  text-decoration:none; /* هذا السطر يزيل الخط */
}

.shop-item img{
  width:40px;
  height:40px;
}

/* SOCIAL */
.follow-us{
  margin-top:40px;
}

.social-icons{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-top:10px;
}

.social-icons img{
transition:0.3s;
cursor:pointer;
}

.social-icons img:hover{
transform:scale(1.2);
}

.social-icons img:active{
transform:scale(1.35);
}

.icon{
  width:35px;
  height:35px;
  border-radius:50%;
  display:inline-block;
}

.icon.facebook{background:#3b5998;}
.icon.whatsapp{background:#25d366;}
.icon.instagram{background:#ac2b2b;}

/* DECORATION */
.bottom-mandala{
  position:fixed;
  bottom:-80px;
  left:50%;
  transform:translateX(-50%);
  width:300px;
  height:300px;
  border:2px solid rgba(84,46,21,0.2);
  border-radius:50%;
  z-index:-1;
}

/* MODAL */
.modal-overlay{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.4);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:20;
}

.modal{
  background:#e9ceb4;
  padding:20px;
  border-radius:10px;
  max-width:300px;
  width:80%;
  text-align:center;
  position:relative;
}

.modal button{
  margin-top:10px;
  padding:8px 15px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  background-color:var(--primary-brown);
  color:#fff9f2;
  transition:0.3s;
  position:relative;
  overflow:hidden;
    margin:10px 5px;
}

.modal button.button-texture::before{
  content:'';
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  background-image: url('images/5.png'), radial-gradient(circle, rgba(255,255,255,0.1), rgba(0,0,0,0.05));
  background-repeat: repeat, repeat;
  background-size: cover;
  background-blend-mode: multiply;
  opacity:0.15;
  pointer-events:none;
  z-index:0;
}
@media (min-width:1200px){

.mobile-container{
max-width:1200px;
}

.slider{
height:500px;
}

.shop-grid{
grid-template-columns:repeat(4,1fr);
}

.bottom-nav{
max-width:1200px;
width:95%;
height:65px;
padding:0;
}

.bottom-nav svg{
width:26px;
height:26px;
}

<script>
// Scroll to categories
function scrollToCategories(){
  const cat = document.getElementById('categories');
  cat.scrollIntoView({behavior:'smooth'});
}

// NAV ACTIVE
const navLinks=document.querySelectorAll(".bottom-nav a");
navLinks.forEach(link=>{
  link.addEventListener("click",()=>{
    navLinks.forEach(l=>l.classList.remove("active"));
    link.classList.add("active");
  });
});

// MODALS
function openModal(type){
  const overlay = document.getElementById('modalOverlay');
  const title = document.getElementById('modalTitle');
  const text = document.getElementById('modalText');
  const buttons = document.getElementById('modalButtons');
  buttons.innerHTML = '';

  if(type==='mystory'){
    title.innerText = 'My Story';
    text.innerText = 'My journey started with a simple passion for handmade jewelry and beautiful details. What began as a small hobby slowly grew into a dream I wanted to share with others Through dedication, learning, and creativity, MARWA MOUSA became a brand that reflects passion, style, and unique designs made to make every woman feel special.';
  } else if(type==='about'){
    title.innerText = 'About';
    text.innerText = 'MARWA MOUSA is a jewelry brand inspired by boho style and natural elegance We create unique pieces designed to add a special touch to your everyday look.';
  } else if(type==='contact'){
    title.innerText = 'Contact';
    text.innerText = 'Contact Us';

    const btnWhats = document.createElement('button');
    btnWhats.classList.add('button-texture');
    btnWhats.innerText = 'WhatsApp';
    btnWhats.onclick = ()=>{ window.open('https://wa.me/01124567136'); };

    const btnMail = document.createElement('button');
    btnMail.classList.add('button-texture');
    btnMail.innerText = 'Email';
    btnMail.onclick = ()=>{ window.location.href = 'mailto:marwamousasite@gmail.com'; };

    buttons.appendChild(btnWhats);
    buttons.appendChild(btnMail);
  }

  overlay.style.display='flex';
}

function closeModal(){
  document.getElementById('modalOverlay').style.display='none';
}

// Slider functionality
const sliderTrack = document.getElementById('sliderTrack');
const slides = sliderTrack.querySelectorAll('img');
const dotsContainer = document.getElementById('sliderDots');

let currentIndex = 0;
let autoSlide;
let startX = 0;
let endX = 0;

// Create dots
slides.forEach((_, i)=>{
  const dot = document.createElement('span');
  if(i===0) dot.classList.add('active');
  dot.addEventListener('click', ()=>{ goToSlide(i); });
  dotsContainer.appendChild(dot);
});

const dots = dotsContainer.querySelectorAll('span');

function goToSlide(index){
  sliderTrack.style.transform = `translateX(${index*100}%)`;
  currentIndex = index;
  updateDots();
}

function updateDots(){
  dots.forEach(d=>d.classList.remove('active'));
  dots[currentIndex].classList.add('active');
}

// Auto slide
function startAutoSlide(){
  autoSlide = setInterval(()=>{
    currentIndex = (currentIndex+1) % slides.length;
    goToSlide(currentIndex);
  },3000);
}

function stopAutoSlide(){
  clearInterval(autoSlide);
}

startAutoSlide();


// Swipe for mobile
sliderTrack.addEventListener('touchstart', (e)=>{
  startX = e.touches[0].clientX;
  stopAutoSlide();
});

sliderTrack.addEventListener('touchmove', (e)=>{
  endX = e.touches[0].clientX;
});

sliderTrack.addEventListener('touchend', ()=>{
  let diff = startX - endX;

  if(diff > 50){
    currentIndex = (currentIndex+1) % slides.length;
  }

  if(diff < -50){
    currentIndex = (currentIndex-1 + slides.length) % slides.length;
  }

  goToSlide(currentIndex);
  startAutoSlide();
});


// Pause on hover (for desktop)
sliderTrack.addEventListener('mouseenter', stopAutoSlide);
sliderTrack.addEventListener('mouseleave', startAutoSlide);

</script>
